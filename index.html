<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 업무 협업 트래커</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* 캘린더 뷰의 스크롤바 숨김 (깔끔한 UI 유지) */
        .calendar-task-scroll::-webkit-scrollbar { display: none; }
        .calendar-task-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen text-slate-800 antialiased">

    <div class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
        
        <header class="mb-8 flex flex-col justify-between gap-4 md:flex-row md:items-center">
            <div>
                <div class="flex items-center gap-2">
                    <span class="inline-flex h-8 w-8 items-center justify-center rounded-lg bg-indigo-600 text-white shadow-md shadow-indigo-200">
                        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012 2h2a2 2 0 012-2m-3 7h3m-3 4h3m-6-4h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                        </svg>
                    </span>
                    <h1 class="text-2xl font-bold tracking-tight text-slate-900">Task Flow Tracker</h1>
                </div>
                <p class="mt-1 text-sm text-slate-500">실시간 업무 배정, 기한 관리 및 진척도 모니터링 시스템</p>
            </div>
            
            <div class="flex flex-wrap items-center gap-2">
                <button id="btn-undo" class="hidden inline-flex items-center gap-2 rounded-xl border border-amber-200 bg-amber-50 px-4 py-2.5 text-sm font-semibold text-amber-700 shadow-sm hover:bg-amber-100 transition">
                    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6" /></svg>
                    실행 취소
                </button>

                <button id="btn-batch-delete" class="hidden inline-flex items-center gap-2 rounded-xl border border-rose-200 bg-rose-50 px-4 py-2.5 text-sm font-semibold text-rose-700 shadow-sm hover:bg-rose-100 transition">
                    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    선택 일괄 삭제
                </button>

                <button id="btn-export-csv" class="inline-flex items-center gap-2 rounded-xl border border-slate-200 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 shadow-sm hover:bg-slate-50 transition">
                    <svg class="h-5 w-5 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                    CSV 다운로드
                </button>

                <button id="btn-export-json" class="inline-flex items-center gap-2 rounded-xl border border-slate-200 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 shadow-sm hover:bg-slate-50 transition">
                    <svg class="h-5 w-5 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" /></svg>
                    데이터 백업
                </button>

                <button id="btn-import-trigger" class="inline-flex items-center gap-2 rounded-xl border border-slate-200 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 shadow-sm hover:bg-slate-50 transition">
                    <svg class="h-5 w-5 text-amber-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                    데이터 가져오기
                </button>
                <input type="file" id="input-import-json" class="hidden" accept=".json">

                <button id="btn-add-task" class="inline-flex items-center gap-2 rounded-xl bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-indigo-700">
                    <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" /></svg>
                    새 업무 추가
                </button>
            </div>
        </header>

        <section class="mb-6 grid grid-cols-2 gap-4 sm:grid-cols-2 lg:grid-cols-5">
            <div id="card-ALL" class="filter-card rounded-2xl border border-slate-100 bg-white p-5 shadow-sm cursor-pointer transition-all duration-200 hover:-translate-y-1 hover:shadow-md">
                <div class="flex items-center justify-between"><span class="text-xs font-semibold text-slate-500 uppercase">전체 업무</span><span class="rounded-full bg-slate-50 p-1.5 text-slate-600"><svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012 2h2a2 2 0 012-2m-3 7h3m-3 4h3m-6-4h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg></span></div>
                <div class="mt-2 flex items-baseline gap-2"><span id="stat-total" class="text-2xl font-bold text-slate-900">0</span><span class="text-xs text-slate-400">건</span></div>
            </div>
            <div id="card-PENDING" class="filter-card rounded-2xl border border-slate-100 bg-white p-5 shadow-sm cursor-pointer transition-all duration-200 hover:-translate-y-1 hover:shadow-md">
                <div class="flex items-center justify-between"><span class="text-xs font-semibold text-slate-500 uppercase">진행 대기</span><span class="rounded-full bg-amber-50 p-1.5 text-amber-600"><svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg></span></div>
                <div class="mt-2 flex items-baseline gap-2"><span id="stat-pending" class="text-2xl font-bold text-slate-900">0</span><span id="stat-pending-pct" class="text-xs text-amber-600 font-medium">0%</span></div>
            </div>
            <div id="card-PROGRESS" class="filter-card rounded-2xl border border-slate-100 bg-white p-5 shadow-sm cursor-pointer transition-all duration-200 hover:-translate-y-1 hover:shadow-md">
                <div class="flex items-center justify-between"><span class="text-xs font-semibold text-slate-500 uppercase">진행 중</span><span class="rounded-full bg-blue-50 p-1.5 text-blue-600"><svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg></span></div>
                <div class="mt-2 flex items-baseline gap-2"><span id="stat-progress" class="text-2xl font-bold text-slate-900">0</span><span id="stat-progress-pct" class="text-xs text-blue-600 font-medium">0%</span></div>
            </div>
            <div id="card-COMPLETED" class="filter-card rounded-2xl border border-slate-100 bg-white p-5 shadow-sm cursor-pointer transition-all duration-200 hover:-translate-y-1 hover:shadow-md">
                <div class="flex items-center justify-between"><span class="text-xs font-semibold text-slate-500 uppercase">완료됨</span><span class="rounded-full bg-emerald-50 p-1.5 text-emerald-600"><svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg></span></div>
                <div class="mt-2 flex items-baseline gap-2"><span id="stat-completed" class="text-2xl font-bold text-slate-900">0</span><span id="stat-completed-pct" class="text-xs text-emerald-600 font-medium">0%</span></div>
            </div>
            <div id="card-OVERDUE" class="filter-card rounded-2xl border border-slate-100 bg-white p-5 shadow-sm col-span-2 lg:col-span-1 cursor-pointer transition-all duration-200 hover:-translate-y-1 hover:shadow-md">
                <div class="flex items-center justify-between"><span class="text-xs font-semibold text-slate-500 uppercase">기한 초과</span><span class="rounded-full bg-rose-50 p-1.5 text-rose-600"><svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4v.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg></span></div>
                <div class="mt-2 flex items-baseline gap-2"><span id="stat-overdue" class="text-2xl font-bold text-rose-600">0</span><span id="stat-overdue-lbl" class="text-xs font-medium">대기 중</span></div>
            </div>
        </section>

        <div class="mb-4 rounded-2xl border border-slate-100 bg-white p-4 shadow-sm">
            <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
                <div class="relative flex-1 max-w-sm">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                    </span>
                    <input type="text" id="filter-search" placeholder="업무명 또는 담당자 검색..." class="w-full rounded-xl border border-slate-200 bg-slate-50 py-2.5 pl-10 pr-3 text-sm outline-none transition focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-100">
                </div>
                <div class="flex flex-wrap items-center gap-3">
                    <select id="filter-status" class="rounded-xl border border-slate-200 bg-white px-3 py-2 text-xs font-medium text-slate-600 outline-none transition focus:border-indigo-500 focus:bg-indigo-50">
                        <option value="ALL">상태: 전체 보기</option>
                        <option value="PENDING">진행 대기</option>
                        <option value="PROGRESS">진행 중</option>
                        <option value="COMPLETED">완료됨</option>
                        <option value="OVERDUE">기한 초과</option>
                    </select>
                    <select id="filter-priority" class="rounded-xl border border-slate-200 bg-white px-3 py-2 text-xs font-medium text-slate-600 outline-none transition focus:border-indigo-500 focus:bg-indigo-50">
                        <option value="ALL">우선순위: 전체 보기</option>
                        <option value="HIGH">높음</option>
                        <option value="NORMAL">보통</option>
                        <option value="LOW">낮음</option>
                    </select>
                    <select id="filter-assignee" class="rounded-xl border border-slate-200 bg-white px-3 py-2 text-xs font-medium text-slate-600 outline-none transition focus:border-indigo-500 focus:bg-indigo-50">
                        <option value="ALL">담당자: 전체</option>
                    </select>
                    <button id="btn-reset-filters" class="rounded-xl bg-slate-100 p-2 text-slate-500 hover:bg-slate-200 hover:text-slate-700 transition" title="필터 초기화">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A9.006 9.006 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.968 8.968 0 01-15.356-2m15.356 2H15" /></svg>
                    </button>
                    <div class="ml-2 inline-flex rounded-xl bg-slate-100 p-1">
                        <button id="btn-view-table" class="rounded-lg bg-white px-4 py-1.5 text-xs font-semibold text-slate-800 shadow-sm transition">목록</button>
                        <button id="btn-view-calendar" class="rounded-lg px-4 py-1.5 text-xs font-semibold text-slate-500 hover:text-slate-800 transition">캘린더</button>
                    </div>
                </div>
            </div>
        </div>

        <main id="view-table" class="overflow-hidden rounded-2xl border border-slate-100 bg-white shadow-sm">
            <div class="overflow-x-auto">
                <table class="w-full min-w-[900px] divide-y divide-slate-100 text-left">
                    <thead class="bg-slate-50 text-xs font-semibold text-slate-500 uppercase tracking-wider">
                        <tr>
                            <th class="w-[5%] px-4 py-4 text-center">
                                <input type="checkbox" id="checkbox-select-all" class="rounded border border-slate-300 cursor-pointer text-indigo-600 focus:ring-indigo-500">
                            </th>
                            <th class="w-[28%] px-6 py-4">업무 상세</th>
                            <th class="w-[14%] px-6 py-4">담당자</th>
                            <th class="w-[14%] px-6 py-4">마감 및 타임라인</th>
                            <th class="w-[11%] px-4 py-4 text-center">우선순위</th>
                            <th class="w-[15%] px-6 py-4 text-center">진행 상태</th>
                            <th class="w-[13%] px-6 py-4 text-center">작업</th>
                        </tr>
                    </thead>
                    <tbody id="task-table-body" class="divide-y divide-slate-100 text-sm"></tbody>
                </table>
            </div>
            <div id="empty-state-table" class="hidden flex-col items-center justify-center p-16 text-center">
                <span class="rounded-full bg-slate-50 p-4 text-slate-300">
                    <svg class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                </span>
                <h3 class="mt-4 text-base font-semibold text-slate-900">해당 조건의 업무가 없습니다.</h3>
            </div>
        </main>

        <main id="view-calendar" class="hidden rounded-2xl border border-slate-100 bg-white shadow-sm p-6">
            <div class="mb-6 flex items-center justify-between">
                <h2 id="calendar-month-year" class="text-xl font-bold text-slate-800"></h2>
                <div class="flex gap-1 bg-slate-100 p-1 rounded-xl">
                    <button id="btn-prev-month" class="rounded-lg px-3 py-1.5 text-sm font-semibold text-slate-600 hover:bg-white hover:shadow-sm transition">&lt;</button>
                    <button id="btn-today-month" class="rounded-lg px-4 py-1.5 text-sm font-semibold text-slate-600 hover:bg-white hover:shadow-sm transition">오늘</button>
                    <button id="btn-next-month" class="rounded-lg px-3 py-1.5 text-sm font-semibold text-slate-600 hover:bg-white hover:shadow-sm transition">&gt;</button>
                </div>
            </div>
            
            <div class="grid grid-cols-7 gap-px bg-slate-200 border border-slate-200 rounded-t-lg overflow-hidden">
                <div class="bg-slate-50 py-2 text-center text-xs font-semibold text-rose-500">일</div>
                <div class="bg-slate-50 py-2 text-center text-xs font-semibold text-slate-500">월</div>
                <div class="bg-slate-50 py-2 text-center text-xs font-semibold text-slate-500">화</div>
                <div class="bg-slate-50 py-2 text-center text-xs font-semibold text-slate-500">수</div>
                <div class="bg-slate-50 py-2 text-center text-xs font-semibold text-slate-500">목</div>
                <div class="bg-slate-50 py-2 text-center text-xs font-semibold text-slate-500">금</div>
                <div class="bg-slate-50 py-2 text-center text-xs font-semibold text-blue-500">토</div>
            </div>
            <div id="calendar-grid" class="grid grid-cols-7 gap-px bg-slate-200 border-x border-b border-slate-200 rounded-b-lg overflow-hidden">
                </div>
        </main>
        
        <footer class="mt-8 text-center text-xs text-slate-400">
            &copy; 2026 Smart Task Flow. All rights reserved. Firebase 실시간 동기화 지원.
        </footer>
    </div>

    <div id="modal-task" class="fixed inset-0 z-50 hidden overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex min-h-screen items-end justify-center px-4 pt-4 pb-20 text-center sm:block sm:p-0">
            <div id="modal-task-backdrop" class="fixed inset-0 bg-slate-500 bg-opacity-40 transition-opacity"></div>
            <span class="hidden sm:inline-block sm:h-screen sm:align-middle" aria-hidden="true">&#8203;</span>
            <div class="inline-block transform overflow-hidden rounded-2xl bg-white text-left align-bottom shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-lg sm:align-middle">
                <div class="bg-white px-6 pt-6 pb-4">
                    <div class="flex items-center justify-between border-b border-slate-100 pb-3">
                        <h3 class="text-lg font-bold text-slate-900" id="modal-title">새로운 업무 배정</h3>
                        <button id="btn-close-task-modal" class="rounded-lg p-1.5 text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition">
                            <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
                        </button>
                    </div>

                    <form id="form-task" class="mt-4 space-y-4">
                        <input type="hidden" id="input-task-id">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">업무명 *</label>
                            <input type="text" id="input-task-title" required maxlength="100" placeholder="수행할 핵심 업무 내용을 적어주세요." class="w-full rounded-xl border border-slate-200 bg-slate-50 px-3.5 py-2 text-sm outline-none transition focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-100">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">담당자 *</label>
                            <input type="text" id="input-task-assignee" required maxlength="30" placeholder="배정할 사람의 이름을 적어주세요." class="w-full rounded-xl border border-slate-200 bg-slate-50 px-3.5 py-2 text-sm outline-none transition focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-100">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-semibold text-slate-500 mb-1">시작일</label>
                                <input type="date" id="input-task-start" class="w-full rounded-xl border border-slate-200 bg-slate-50 px-3.5 py-2 text-sm outline-none transition focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-100">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-slate-500 mb-1">마감일 *</label>
                                <input type="date" id="input-task-due" required class="w-full rounded-xl border border-slate-200 bg-slate-50 px-3.5 py-2 text-sm outline-none transition focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-100">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-semibold text-slate-500 mb-1">우선순위</label>
                                <select id="input-task-priority" class="w-full rounded-xl border border-slate-200 bg-slate-50 px-3.5 py-2 text-sm outline-none transition focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-100">
                                    <option value="HIGH">높음 🔴</option><option value="NORMAL" selected>보통 🟡</option><option value="LOW">낮음 🟢</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-slate-500 mb-1">현재 상태</label>
                                <select id="input-task-status" class="w-full rounded-xl border border-slate-200 bg-slate-50 px-3.5 py-2 text-sm outline-none transition focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-100">
                                    <option value="PENDING" selected>진행 대기 ⌛</option><option value="PROGRESS">진행 중 ⚙️</option><option value="COMPLETED">완료 ⭐️</option>
                                </select>
                            </div>
                        </div>

        const firebaseConfig = {

            appId: "1:604212921594:web:c5ba2b450932c740ef7543",

        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        db.enablePersistence().catch(err => { console.warn("오프라인 모드 활성화 실패:", err.code); });

        let tasks = [];
        let deletionHistory = [];

        let currentViewMode = 'TABLE'; 
        let currentCalDate = new Date(); 

        const AVATAR_COLORS = [
            'bg-indigo-100 text-indigo-700', 'bg-emerald-100 text-emerald-700', 'bg-sky-100 text-sky-700', 
            'bg-amber-100 text-amber-700', 'bg-rose-100 text-rose-700', 'bg-violet-100 text-violet-700', 'bg-teal-100 text-teal-700'
        ];

        const getTodayStr = () => {
            const d = new Date();
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        };
        const getFutureDateStr = (days) => {
            const d = new Date(); d.setDate(d.getDate() + days);
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        };

        const escapeHTML = (str) => {
            if (!str) return '';
            return str.toString().replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        };

        window.addEventListener('DOMContentLoaded', () => {
            setupEventListeners();
            db.collection("tasks").onSnapshot((snapshot) => {
                tasks = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                updateUI();

        });

        function setupEventListeners() {
            document.getElementById('btn-add-task').addEventListener('click', () => openTaskModal());
            document.getElementById('btn-export-csv').addEventListener('click', exportToCSV);
            document.getElementById('btn-export-json').addEventListener('click', exportToJSON);
            document.getElementById('btn-import-trigger').addEventListener('click', () => document.getElementById('input-import-json').click());
            document.getElementById('input-import-json').addEventListener('change', importFromJSON);
            document.getElementById('btn-batch-delete').addEventListener('click', confirmBatchDelete);
            document.getElementById('btn-undo').addEventListener('click', undoDelete);
            
            document.getElementById('filter-search').addEventListener('input', renderActiveViews);
            document.getElementById('filter-status').addEventListener('change', renderActiveViews);
            document.getElementById('filter-priority').addEventListener('change', renderActiveViews);
            document.getElementById('filter-assignee').addEventListener('change', renderActiveViews);
            document.getElementById('btn-reset-filters').addEventListener('click', resetFilters);

            document.querySelectorAll('.filter-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    const status = e.currentTarget.id.replace('card-', '');
                    document.getElementById('filter-status').value = status;
                    renderActiveViews();
                    showToast(`필터 적용됨: ${getStatusKorean(status)}`);
                });
            });

            document.getElementById('btn-view-table').addEventListener('click', () => switchViewMode('TABLE'));
            document.getElementById('btn-view-calendar').addEventListener('click', () => switchViewMode('CALENDAR'));

            document.getElementById('btn-prev-month').addEventListener('click', () => { currentCalDate.setMonth(currentCalDate.getMonth() - 1); renderActiveViews(); });
            document.getElementById('btn-next-month').addEventListener('click', () => { currentCalDate.setMonth(currentCalDate.getMonth() + 1); renderActiveViews(); });
            document.getElementById('btn-today-month').addEventListener('click', () => { currentCalDate = new Date(); renderActiveViews(); });

            document.getElementById('form-task').addEventListener('submit', handleTaskSubmit);
            document.getElementById('btn-close-task-modal').addEventListener('click', closeModal);
            document.getElementById('btn-cancel-task').addEventListener('click', closeModal);
            document.getElementById('modal-task-backdrop').addEventListener('click', closeModal);
            document.getElementById('btn-cancel-confirm').addEventListener('click', closeConfirmModal);
            document.getElementById('modal-confirm-backdrop').addEventListener('click', closeConfirmModal);
            document.getElementById('btn-action-confirm').addEventListener('click', () => { if (confirmActionCb) confirmActionCb(); });

            document.getElementById('task-table-body').addEventListener('click', handleTableClick);
            document.getElementById('task-table-body').addEventListener('change', handleTableChange);
            document.getElementById('checkbox-select-all').addEventListener('change', toggleSelectAll);

            document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { closeModal(); closeConfirmModal(); } });
        }

        function switchViewMode(mode) {
            currentViewMode = mode;
            const btnTable = document.getElementById('btn-view-table');
            const btnCal = document.getElementById('btn-view-calendar');
            const viewTable = document.getElementById('view-table');
            const viewCal = document.getElementById('view-calendar');

            if (mode === 'TABLE') {
                btnTable.className = 'rounded-lg bg-white px-4 py-1.5 text-xs font-semibold text-slate-800 shadow-sm transition';
                btnCal.className = 'rounded-lg px-4 py-1.5 text-xs font-semibold text-slate-500 hover:text-slate-800 transition';
                viewTable.classList.remove('hidden'); viewCal.classList.add('hidden');
            } else {
                btnCal.className = 'rounded-lg bg-white px-4 py-1.5 text-xs font-semibold text-slate-800 shadow-sm transition';
                btnTable.className = 'rounded-lg px-4 py-1.5 text-xs font-semibold text-slate-500 hover:text-slate-800 transition';
                viewCal.classList.remove('hidden'); viewTable.classList.add('hidden');
            }
            renderActiveViews();
        }

        function updateUI() {
            renderStats();
            buildAssigneeDropdownFilter();
            renderActiveViews();
            updateUndoButton();
        }

        function renderActiveViews() {
            const filteredTasks = getFilteredTasks();
            
            const fStatus = document.getElementById('filter-status').value;
            document.querySelectorAll('.filter-card').forEach(c => c.classList.remove('ring-2', 'ring-indigo-600', 'bg-indigo-50/10'));
            const activeCard = document.getElementById(`card-${fStatus}`);
            if (activeCard) activeCard.classList.add('ring-2', 'ring-indigo-600', 'bg-indigo-50/10');

            renderTable(filteredTasks);
            if (currentViewMode === 'CALENDAR') {
                renderCalendar(filteredTasks);
            }
        }

        function getFilteredTasks() {
            const keyword = document.getElementById('filter-search').value.toLowerCase().trim();
            const fStatus = document.getElementById('filter-status').value;
            const fPriority = document.getElementById('filter-priority').value;
            const fAssignee = document.getElementById('filter-assignee').value;
            const today = getTodayStr();

            return tasks.filter(t => {
                const sMatch = (t.title||'').toLowerCase().includes(keyword) || (t.assignee||'').toLowerCase().includes(keyword);
                let stMatch = true;
                if (fStatus !== 'ALL') {
                    if (fStatus === 'OVERDUE') stMatch = t.status !== 'COMPLETED' && (t.dueDate||'') < today;
                    else stMatch = t.status === fStatus;
                }
                const pMatch = fPriority === 'ALL' || t.priority === fPriority;
                const aMatch = fAssignee === 'ALL' || t.assignee === fAssignee;
                return sMatch && stMatch && pMatch && aMatch;
            });
        }

        function renderTable(filtered) {
            const tbody = document.getElementById('task-table-body');
            const emptyState = document.getElementById('empty-state-table');
            
            tbody.innerHTML = '';
            if (filtered.length === 0) {
                emptyState.classList.replace('hidden', 'flex');
                updateSelectAllState(0);
                return;
            } else {
                emptyState.classList.replace('flex', 'hidden');
            }

            filtered.sort((a, b) => (a.dueDate||'').localeCompare(b.dueDate||''));

            let renderedSelectedCount = 0;
            filtered.forEach(t => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-slate-50 transition-colors group';
                const isChecked = selectedTaskIds.has(t.id);
                if (isChecked) renderedSelectedCount++;

                const escTitle = escapeHTML(t.title);
                const escAssignee = escapeHTML(t.assignee);
                const timeline = getTimelineStatus(t.dueDate || getTodayStr(), t.status);

                tr.innerHTML = `
                    <td class="px-4 py-4 text-center"><input type="checkbox" class="cb-task rounded border-slate-300 text-indigo-600 focus:ring-indigo-500 cursor-pointer" data-id="${t.id}" ${isChecked ? 'checked' : ''}></td>
                    <td class="px-6 py-4"><div class="flex flex-col gap-1"><span class="font-semibold text-slate-900 line-clamp-1 group-hover:text-indigo-600 transition" title="${escTitle}">${escTitle}</span><span class="text-xs text-slate-400 line-clamp-1">${escapeHTML(t.notes || '추가 지침 없음')}</span></div></td>
                    <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center gap-2.5"><span class="flex h-7 w-7 items-center justify-center rounded-full text-xs font-bold ${getAvatarStyle(escAssignee)}">${escAssignee.charAt(0) || 'U'}</span><span class="font-medium text-slate-700">${escAssignee || '미지정'}</span></div></td>
                    <td class="px-6 py-4 whitespace-nowrap"><div class="flex flex-col"><span class="text-xs text-slate-500 font-medium">${t.startDate ? t.startDate.substring(5) : '미정'} ~ ${(t.dueDate || '').substring(5)}</span><span class="mt-1 inline-self-start text-[11px] font-medium border rounded-md px-1.5 py-0.5 text-center ${timeline.class}">${timeline.text}</span></div></td>
                    <td class="px-4 py-4 text-center whitespace-nowrap">${getPriorityBadge(t.priority)}</td>
                    <td class="px-6 py-4 text-center"><select class="sel-status mx-auto block rounded-xl border border-slate-200 bg-white px-2.5 py-1.5 text-xs font-semibold text-slate-600 outline-none transition focus:border-indigo-500 focus:bg-indigo-50" data-id="${t.id}">
                        <option value="PENDING" ${t.status === 'PENDING' ? 'selected' : ''}>진행 대기 ⌛</option><option value="PROGRESS" ${t.status === 'PROGRESS' ? 'selected' : ''}>진행 중 ⚙️</option><option value="COMPLETED" ${t.status === 'COMPLETED' ? 'selected' : ''}>완료됨 ⭐️</option>
                    </select></td>
                    <td class="px-6 py-4 whitespace-nowrap text-center"><div class="flex items-center justify-center gap-2">
                        <button class="btn-edit rounded-lg p-1.5 text-slate-400 hover:bg-slate-100 hover:text-indigo-600 transition" data-id="${t.id}" title="상세 편집"><svg class="h-5 w-5 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg></button>
                        <button class="btn-delete rounded-lg p-1.5 text-slate-400 hover:bg-slate-100 hover:text-rose-600 transition" data-id="${t.id}" title="삭제"><svg class="h-5 w-5 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg></button>
                    </div></td>
                `;
                tbody.appendChild(tr);
            });
            updateSelectAllState(filtered.length, renderedSelectedCount);
        }

        // ====== 핵심 수정 부분 (간트 차트형 캘린더) ======
        function renderCalendar(filteredTasks) {
            const year = currentCalDate.getFullYear();
            const month = currentCalDate.getMonth();
            document.getElementById('calendar-month-year').textContent = `${year}년 ${month + 1}월`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            const todayStr = getTodayStr();

            // 1. 태스크 레인(Lane, 슬롯) 할당을 위한 전처리 및 정렬
            filteredTasks.forEach(t => {
                t._start = t.startDate || t.dueDate || todayStr;
                t._end = t.dueDate || todayStr;
                if (t._start > t._end) t._start = t._end; // 시작일이 더 늦은 예외 처리
            });

            // 시작일 순 -> 기간이 긴 순(종료일이 늦은 순) 정렬
            filteredTasks.sort((a, b) => {
                if (a._start !== b._start) return a._start.localeCompare(b._start);
                return b._end.localeCompare(a._end);
            });

            const lanes = [];
            const taskLanes = {}; // 각 태스크 ID별 위치할 레인(층) 인덱스
            
            filteredTasks.forEach(t => {
                let assigned = -1;
                for (let i = 0; i < lanes.length; i++) {
                    let overlap = false;
                    for (let jt of lanes[i]) {
                        // 두 태스크가 겹치는지 확인 (시작1 <= 끝2 && 시작2 <= 끝1)
                        if (t._start <= jt._end && jt._start <= t._end) {
                            overlap = true; break;
                        }
                    }
                    if (!overlap) { assigned = i; lanes[i].push(t); break; }
                }
                if (assigned === -1) { assigned = lanes.length; lanes.push([t]); }
                taskLanes[t.id] = assigned;
            });

            // 2. 1일 이전 빈 공백 셀 렌더링
            for (let i = 0; i < firstDay; i++) {
                const cell = document.createElement('div');
                cell.className = 'bg-slate-50 min-h-[120px] border-r border-b border-slate-100';
                grid.appendChild(cell);
            }

            // 3. 실제 날짜 셀 렌더링
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                const isToday = dateStr === todayStr;

                // 달력 그리드 상 현재 셀의 위치로 요일 파악
                const cellIndex = firstDay + day - 1;
                const dayOfWeek = cellIndex % 7;
                const isWeekStart = dayOfWeek === 0; // 일요일
                const isWeekEnd = dayOfWeek === 6; // 토요일

                const cell = document.createElement('div');
                cell.className = `bg-white min-h-[120px] flex flex-col transition-colors border-r border-b border-slate-100 ${isToday ? 'bg-indigo-50/20' : 'hover:bg-slate-50'}`;

                // 날짜 헤더 표시 영역
                const dayHeader = document.createElement('div');
                if(isToday) {
                    dayHeader.innerHTML = `<div class="bg-indigo-600 text-white rounded-full w-6 h-6 flex items-center justify-center font-bold">${day}</div>`;
                    dayHeader.className = `text-xs p-1.5`;
                } else {
                    dayHeader.textContent = day;
                    dayHeader.className = `text-xs font-semibold p-1.5 ${dayOfWeek === 0 ? 'text-rose-500' : dayOfWeek === 6 ? 'text-blue-500' : 'text-slate-600'}`;
                }
                cell.appendChild(dayHeader);

                // 업무 표시 컨테이너 (스크롤 대신 유연하게 늘어나도록 설정)
                const taskContainer = document.createElement('div');
                taskContainer.className = "flex flex-col flex-1 pb-1";

                // 해당 날짜에 포함된 태스크만 필터링
                const dayTasks = filteredTasks.filter(t => dateStr >= t._start && dateStr <= t._end);
                // 오늘 출력해야할 최대 레인(층) 계산
                const maxLane = Math.max(...dayTasks.map(t => taskLanes[t.id]), -1);

                // 0번 레인부터 최대 레인까지 순회하며 해당 층에 업무나 빈 칸을 렌더링
                for (let i = 0; i <= maxLane; i++) {
                    const t = dayTasks.find(t => taskLanes[t.id] === i);
                    if (t) {
                        const isStart = dateStr === t._start;
                        const isEnd = dateStr === t._end;
                        
                        // 텍스트는 업무 시작일이거나 새로운 주의 시작(일요일)일 때만 출력
                        const showText = isStart || isWeekStart;

                        let bgClass = 'bg-slate-200 text-slate-700';
                        let statusLabel = '대기'; let icon = '⌛';
                        
                        if (t.status === 'COMPLETED') {
                            bgClass = 'bg-emerald-100 text-emerald-800'; statusLabel = '완료'; icon = '⭐️';
                        } else if (t.status === 'PROGRESS') {
                            bgClass = 'bg-blue-100 text-blue-800'; statusLabel = '진행'; icon = '⚙️';
                        } else if (todayStr > t._end && t.status !== 'COMPLETED') {
                            bgClass = 'bg-rose-100 text-rose-800'; statusLabel = '지연'; icon = '🚨';
                        }

                        // 여러 셀에 걸친 리본 형태로 만들기 위한 Shape & Margin 클래스 조정
                        let shapeClass = 'h-[22px] flex items-center mb-1';
                        
                        if (isStart && isEnd) {
                            shapeClass += ' rounded mx-1 px-1.5';
                        } else if (isStart) {
                            shapeClass += ' rounded-l ml-1 mr-0 pr-0 pl-1.5';
                        } else if (isEnd) {
                            shapeClass += ' rounded-r mr-1 ml-0 pl-0 pr-1.5';
                        } else {
                            shapeClass += ' mx-0 px-0 rounded-none';
                        }

                        // 중간 연결되는 일자의 경우, 그리드의 gap을 덮기 위해 왼쪽 음수 마진 적용 (-ml-[1px])
                        if (!isStart && !isWeekStart) {
                            shapeClass += ' -ml-[1px] relative z-10';
                        }

                        const taskEl = document.createElement('div');
                        taskEl.className = `text-[10.5px] font-medium cursor-pointer transition-all hover:brightness-95 ${bgClass} ${shapeClass}`;
                        taskEl.title = `[${statusLabel}] ${escapeHTML(t.title)} (${t._start} ~ ${t._end})`;
                        taskEl.onclick = () => openTaskModal(t.id);

                        if (showText) {
                            const textContainer = document.createElement('div');
                            textContainer.className = 'truncate w-full whitespace-nowrap z-20';
                            if (isWeekStart && !isStart) {
                                // 주가 바뀌어서 중간부터 이어지는 경우 투명하게 표시
                                textContainer.innerHTML = `<span class="opacity-75 font-normal pl-1.5">(${escapeHTML(t.title)})</span>`;
                            } else {
                                textContainer.innerHTML = `<span>${icon}</span> ${escapeHTML(t.title)}`;
                            }
                            taskEl.appendChild(textContainer);
                        }

                        taskContainer.appendChild(taskEl);
                    } else {
                        // 해당 층에 업무가 없는 날이면 위치 유지를 위해 동일한 높이의 투명한 공백 삽입
                        const spacer = document.createElement('div');
                        spacer.className = 'h-[22px] mb-1';
                        taskContainer.appendChild(spacer);
                    }
                }
                cell.appendChild(taskContainer);
                grid.appendChild(cell);
            }

            // 4. 마지막 날짜 이후 빈 공백 셀 렌더링
            const totalCells = firstDay + daysInMonth;
            const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
            for (let i = 0; i < remaining; i++) {
                const cell = document.createElement('div');
                cell.className = 'bg-slate-50 min-h-[120px] border-r border-b border-slate-100';
                grid.appendChild(cell);
            }
        }
        // ===================================================

        function renderStats() {
            const total = tasks.length;
            const pending = tasks.filter(t => t.status === 'PENDING').length;
            const progress = tasks.filter(t => t.status === 'PROGRESS').length;
            const completed = tasks.filter(t => t.status === 'COMPLETED').length;
            
            const today = getTodayStr();
            const overdue = tasks.filter(t => t.status !== 'COMPLETED' && (t.dueDate||'') < today).length;

            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-pending').textContent = pending;
            document.getElementById('stat-progress').textContent = progress;
            document.getElementById('stat-completed').textContent = completed;
            document.getElementById('stat-overdue').textContent = overdue;
            document.getElementById('stat-pending-pct').textContent = total > 0 ? `${Math.round((pending/total)*100)}%` : '0%';
            document.getElementById('stat-progress-pct').textContent = total > 0 ? `${Math.round((progress/total)*100)}%` : '0%';
            document.getElementById('stat-completed-pct').textContent = total > 0 ? `${Math.round((completed/total)*100)}%` : '0%';
            
            const overdueLbl = document.getElementById('stat-overdue-lbl');
            overdueLbl.textContent = overdue > 0 ? '조속히 조치 필요' : '매우 양호';
            overdueLbl.className = `text-xs font-medium ${overdue > 0 ? 'text-rose-500 font-semibold' : 'text-emerald-500'}`;
        }

        function buildAssigneeDropdownFilter() {
            const select = document.getElementById('filter-assignee');
            const currentVal = select.value;
            const assignees = [...new Set(tasks.map(t => t.assignee).filter(Boolean))];
            
            select.innerHTML = '<option value="ALL">담당자: 전체</option>';
            assignees.forEach(n => {
                const opt = document.createElement('option'); opt.value = opt.textContent = escapeHTML(n);
                select.appendChild(opt);
            });
            if (assignees.includes(currentVal)) select.value = currentVal;
        }

        async function handleTaskSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('input-task-id').value;
            const start = document.getElementById('input-task-start').value;
            const due = document.getElementById('input-task-due').value;

            if (start && due && start > due) return showToast('시작일은 마감일보다 늦을 수 없습니다.', false);

            const data = {
                title: document.getElementById('input-task-title').value.trim(),
                assignee: document.getElementById('input-task-assignee').value.trim(),
                startDate: start, dueDate: due,
                priority: document.getElementById('input-task-priority').value,
                status: document.getElementById('input-task-status').value,
                notes: document.getElementById('input-task-notes').value.trim()
            };

            try {
                if (id) { await db.collection("tasks").doc(id).update(data); showToast('수정되었습니다.'); } 
                else { await db.collection("tasks").add(data); showToast('추가되었습니다.'); }
                closeModal();
            } catch(err) { showToast('저장 실패', false); }
        }

        async function updateTaskStatus(id, newStatus) {
            try { await db.collection("tasks").doc(id).update({ status: newStatus }); showToast(`상태 변경: ${getStatusKorean(newStatus)}`); } catch(e) { showToast('업데이트 실패', false); }
        }

        function confirmDelete(id) {
            const t = tasks.find(x => x.id === id); if (!t) return;
            document.getElementById('confirm-title').textContent = '업무 삭제 알림';
            document.getElementById('confirm-message').innerHTML = `<strong>'${escapeHTML(t.title)}'</strong> 업무를 삭제하시겠습니까?`;
            confirmActionCb = async () => {
                try {
                    await db.collection("tasks").doc(id).delete(); deletionHistory.push({ timestamp: Date.now(), items: [t] });
                    selectedTaskIds.delete(id); closeConfirmModal(); showToast('삭제되었습니다.');
                } catch(e) { showToast('삭제 실패', false); }
            };
            document.getElementById('modal-confirm').classList.remove('hidden');
        }

        function confirmBatchDelete() {
            if (selectedTaskIds.size === 0) return;
            document.getElementById('confirm-title').textContent = '선택한 업무 일괄 삭제';
            document.getElementById('confirm-message').innerHTML = `선택된 <strong>${selectedTaskIds.size}개</strong>의 업무를 삭제하시겠습니까?`;
            confirmActionCb = async () => {
                const batch = db.batch(); const deleted = [];
                selectedTaskIds.forEach(id => { const task = tasks.find(t => t.id === id); if(task) { deleted.push(task); batch.delete(db.collection("tasks").doc(id)); } });
                try {
                    await batch.commit(); deletionHistory.push({ timestamp: Date.now(), items: deleted });
                    selectedTaskIds.clear(); closeConfirmModal(); showToast(`${deleted.length}개 삭제됨.`);
                } catch(e) { showToast('일괄 삭제 실패', false); }
            };
            document.getElementById('modal-confirm').classList.remove('hidden');
        }

        async function undoDelete() {
            if (deletionHistory.length === 0) return;
            const last = deletionHistory.pop(); const batch = db.batch();
            last.items.forEach(t => { const { id, ...data } = t; batch.set(db.collection("tasks").doc(id), data); });
            try { await batch.commit(); showToast(`${last.items.length}개 복원됨.`); } catch(e) { showToast('복원 실패', false); }
        }

        function handleTableClick(e) {
            const editBtn = e.target.closest('.btn-edit'); const delBtn = e.target.closest('.btn-delete');
            if (editBtn) openTaskModal(editBtn.dataset.id);
            if (delBtn) confirmDelete(delBtn.dataset.id);
        }

        function handleTableChange(e) {
            const sel = e.target.closest('.sel-status'); const cb = e.target.closest('.cb-task');
            if (sel) updateTaskStatus(sel.dataset.id, sel.value);
            if (cb) { cb.checked ? selectedTaskIds.add(cb.dataset.id) : selectedTaskIds.delete(cb.dataset.id); renderActiveViews(); updateBatchButton(); }
        }

        function toggleSelectAll(e) {
            const isChecked = e.target.checked;
            document.querySelectorAll('.cb-task').forEach(cb => isChecked ? selectedTaskIds.add(cb.dataset.id) : selectedTaskIds.delete(cb.dataset.id));
            renderActiveViews(); updateBatchButton();
        }

        function updateSelectAllState(totalVis, totalSel) {
            const cbAll = document.getElementById('checkbox-select-all');
            if (totalVis === 0) { cbAll.checked = false; cbAll.indeterminate = false; cbAll.disabled = true; } 
            else { cbAll.disabled = false; cbAll.checked = (totalVis === totalSel); cbAll.indeterminate = totalSel > 0 && totalSel < totalVis; }
            updateBatchButton();
        }

        function updateBatchButton() {
            const btn = document.getElementById('btn-batch-delete');
            selectedTaskIds.size > 0 ? btn.classList.remove('hidden') : btn.classList.add('hidden');
        }

        function updateUndoButton() {
            const btn = document.getElementById('btn-undo');
            deletionHistory.length > 0 ? btn.classList.remove('hidden') : btn.classList.add('hidden');
        }

        function resetFilters() {
            document.getElementById('filter-search').value = ''; document.getElementById('filter-status').value = 'ALL';
            document.getElementById('filter-priority').value = 'ALL'; document.getElementById('filter-assignee').value = 'ALL';
            renderActiveViews();
        }

        function openTaskModal(id = null) {
            document.getElementById('form-task').reset();
            const title = document.getElementById('modal-title');
            if (id) {
                const t = tasks.find(x => x.id === id); if (!t) return;
                title.textContent = '업무 상세 변경';
                document.getElementById('input-task-id').value = t.id; document.getElementById('input-task-title').value = t.title || '';
                document.getElementById('input-task-assignee').value = t.assignee || ''; document.getElementById('input-task-start').value = t.startDate || '';
                document.getElementById('input-task-due').value = t.dueDate || ''; document.getElementById('input-task-priority').value = t.priority || 'NORMAL';
                document.getElementById('input-task-status').value = t.status || 'PENDING'; document.getElementById('input-task-notes').value = t.notes || '';
            } else {
                title.textContent = '새로운 업무 배정';
                document.getElementById('input-task-id').value = '';
                document.getElementById('input-task-start').value = getTodayStr(); document.getElementById('input-task-due').value = getFutureDateStr(7);
            }
            document.getElementById('modal-task').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal-task').classList.add('hidden'); }
        function closeConfirmModal() { document.getElementById('modal-confirm').classList.add('hidden'); confirmActionCb = null; }

        async function importFromJSON(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = async (ev) => {
                try {
                    const imp = JSON.parse(ev.target.result); if (!Array.isArray(imp)) throw new Error("배열 아님");
                    const batch = db.batch(); const validStatus = ['PENDING','PROGRESS','COMPLETED','OVERDUE']; const validPri = ['HIGH','NORMAL','LOW'];
                    imp.forEach(t => { if(!t.title||!t.assignee||!t.dueDate||!validStatus.includes(t.status)||!validPri.includes(t.priority)) throw new Error("데이터 서식 오류");
                        const { id, ...data } = t; batch.set(db.collection("tasks").doc(), data);
                    });
                    await batch.commit(); showToast('성공적으로 불러왔습니다.');
                } catch (err) { showToast('읽기 오류 발생', false); }
            }; reader.readAsText(file); e.target.value = '';
        }

        function exportToJSON() {
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(JSON.stringify(tasks, null, 4));
            const link = document.createElement('a'); link.href = dataUri; link.download = `backup_${getTodayStr()}.json`; link.click();
        }

        function exportToCSV() {
            let csv = "\uFEFF업무명,담당자,시작일,마감일,우선순위,상태,세부메모\n";
            tasks.forEach(t => { csv += `"${(t.title||'').replace(/"/g, '""')}","${(t.assignee||'').replace(/"/g, '""')}","${t.startDate||''}","${t.dueDate||''}","${t.priority==='HIGH'?'높음':t.priority==='NORMAL'?'보통':'낮음'}","${getStatusKorean(t.status)}","${(t.notes||'').replace(/"/g, '""')}"\n`; });
            const link = document.createElement("a"); link.href = URL.createObjectURL(new Blob([csv], {type: 'text/csv;charset=utf-8;'}));
            link.download = `export_${getTodayStr()}.csv`; link.click();
        }

        function showToast(msg, isSuccess = true) {
            const t = document.getElementById('toast'); document.getElementById('toast-text').textContent = msg;
            document.getElementById('toast-icon').innerHTML = isSuccess ? `<svg class="h-5 w-5 text-emerald-400" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" /></svg>` : `<svg class="h-5 w-5 text-amber-400" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" /></svg>`;
            t.classList.remove('translate-y-10', 'opacity-0'); t.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => { t.classList.remove('translate-y-0', 'opacity-100'); t.classList.add('translate-y-10', 'opacity-0'); }, 4000);
        }

        function getAvatarStyle(name) {
            if (!name) return AVATAR_COLORS[0]; let sum = 0; for(let i=0; i<name.length; i++) sum += name.charCodeAt(i); return AVATAR_COLORS[sum % AVATAR_COLORS.length];
        }

        function getTimelineStatus(dueStr, status) {
            if (status === 'COMPLETED') return { text: '완료됨', class: 'bg-emerald-50 text-emerald-700 border-emerald-100' };
            const diff = Math.ceil((new Date(dueStr.replace(/-/g, '/')) - new Date(getTodayStr().replace(/-/g, '/'))) / 86400000);
            if (diff < 0) return { text: `기한 초과 (D+${Math.abs(diff)})`, class: 'bg-rose-50 text-rose-700 border-rose-100 font-semibold' };
            if (diff === 0) return { text: '오늘 마감', class: 'bg-amber-50 text-amber-700 border-amber-200 animate-pulse font-semibold' };
            return { text: `D-${diff}`, class: 'bg-slate-100 text-slate-700 border-slate-200' };
        }

        function getPriorityBadge(priority) {
            if (priority === 'HIGH') return '<span class="inline-flex rounded-md bg-rose-50 px-2 py-1 text-xs font-semibold text-rose-700 ring-1 ring-inset ring-rose-600/10">높음</span>';
            if (priority === 'NORMAL') return '<span class="inline-flex rounded-md bg-amber-50 px-2 py-1 text-xs font-semibold text-amber-700 ring-1 ring-inset ring-amber-600/10">보통</span>';
            return '<span class="inline-flex rounded-md bg-emerald-50 px-2 py-1 text-xs font-semibold text-emerald-700 ring-1 ring-inset ring-emerald-600/10">낮음</span>';
        }

        function getStatusKorean(status) { return { 'PENDING': '진행 대기', 'PROGRESS': '진행 중', 'COMPLETED': '완료됨', 'OVERDUE': '기한 초과' }[status] || '전체'; }
    </script>
</body>
</html>
